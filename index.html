<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hai Yen | PhD Candidate</title>
    <meta
      name="description"
      content="Personal academic portfolio for a PhD candidate seeking research, data, and applied AI opportunities."
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="shell header-inner">
        <a class="brand" href="#top" id="brand-name">Hai Yen</a>
        <nav class="main-nav" aria-label="Primary">
          <a href="#background">Background</a>
          <a href="#news">News</a>
          <a href="#focus">Focus</a>
          <a href="#papers">Papers</a>
          <a href="#contact">Contact</a>
        </nav>
      </div>
    </header>

    <main id="top">
      <section class="hero">
        <img
          class="hero-image"
          src="assets/hero-academic-workspace.png"
          alt="A bright academic workspace with books, a laptop, notebooks, and research materials."
        />
        <div class="hero-scrim"></div>
        <div class="shell hero-content">
          <p class="eyebrow" id="hero-status"></p>
          <h1 id="hero-name"></h1>
          <p class="hero-role" id="hero-role"></p>
          <p class="hero-lead" id="hero-headline"></p>
          <div class="hero-actions" id="hero-actions"></div>
        </div>
      </section>

      <section class="section intro-band">
        <div class="shell intro-grid">
          <div>
            <p class="section-label">Current focus</p>
            <p class="intro-copy" id="intro-copy"></p>
          </div>
          <div class="opportunity-panel">
            <p class="opportunity-label">Open to</p>
            <div class="tag-list" id="opportunity-tags"></div>
          </div>
        </div>
      </section>

      <section class="section" id="background">
        <div class="shell">
          <div class="section-heading">
            <p class="section-label">Background</p>
            <h2 id="background-heading"></h2>
          </div>
          <div class="about-grid">
            <div class="about-copy" id="background-copy"></div>
            <div class="quick-facts" id="quick-facts"></div>
          </div>
        </div>
      </section>

      <section class="section section-accent" id="focus">
        <div class="shell">
          <div class="section-heading">
            <p class="section-label">Strengths</p>
            <!-- <h2>What I bring to a research or product team</h2> -->
          </div>
          <div class="card-grid" id="strength-cards"></div>
        </div>
      </section>

      <section class="section" id="papers">
        <div class="shell">
          <div class="section-heading">
            <p class="section-label">Selected papers</p>
            <h2 id="papers-heading"></h2>
          </div>
          <div class="paper-grid" id="paper-cards"></div>
        </div>
      </section>

      <section class="section" id="news">
        <div class="shell">
          <div class="section-heading">
            <p class="section-label">News</p>
            <h2 id="news-heading"></h2>
          </div>
          <ul class="news-list" id="news-list"></ul>
        </div>
      </section>

      <section class="section section-accent" id="work">
        <div class="shell">
          <div class="section-heading">
            <p class="section-label">Selected work</p>
            <h2 id="highlights-heading"></h2>
          </div>
          <div class="timeline-grid" id="highlight-cards"></div>
        </div>
      </section>

      <section class="section section-dark" id="contact">
        <div class="shell contact-layout">
          <div>
            <p class="section-label section-label-light">Contact</p>
            <!-- <h2 class="contact-title">Ready for next challenges</h2> -->
            <p class="contact-copy" id="contact-copy"></p>
          </div>
          <div>
            <div class="contact-actions" id="contact-actions"></div>
            <p class="contact-note" id="contact-note"></p>
          </div>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="shell footer-inner">
        <p><span id="footer-name"></span> <span id="footer-year"></span></p>
        <p>Built for GitHub Pages.</p>
      </div>
    </footer>

    <script src="site.js"></script>
  </body>
</html>
